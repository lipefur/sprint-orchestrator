# Example: SuperDB project profile (canonical real-world reference)
#
# This is the complete profile of the SuperDB project where this skill was first
# validated across 17+ sprints. Use as reference when configuring your own project.

version: 1
project_name: superdb
default_branch: main

paths:
  plans: docs/superpowers/plans
  worktrees: .claude/worktrees
  memory: ~/.claude/projects/-Users-felipepadilha-Documents-superbase/memory

smoke:
  local: bin/smoke-local.sh
  ci_workflow: smoke-e2e.yml

git:
  worktree_prefix: sprint
  pr_title_prefix: "feat(sprint-N):"
  conventional_commits: true
  semantic_release: true     # SuperDB uses semantic-release for tags + CHANGELOG

dispatch:
  method: auto               # auto-detect (Claude Code, Cursor, VS Code, Antigravity, Windsurf)

deploy_method: coolify-ssh

addons:
  - postgres
  - multi-tenant
  - monorepo
  - nextjs
  - coolify-ssh
  - github-actions
  - nginx
  - docs-public
  - hono
  - e2e-validation

# Notifications: GitHub + macOS combined for max redundancy
notifications:
  github_assignee: lipefur
  github_label: ready-for-review
  macos: true                # macOS Notification Center popup when PR detected
  webhook: null
  email: null

# Per-addon overrides
coolify-ssh:
  host_alias: production-vps    # ssh alias defined in ~/.ssh/config
  api_base: https://coolify.example.com
  # token is read from COOLIFY_TOKEN env var, NEVER stored here

postgres:
  containers_pattern: "postgres-*"
  superuser_role: postgres
  service_role: platform_admin

multi-tenant:
  global_schemas: [auth_global, proj_management]
  tenant_schema_pattern: "proj_*"
  tenant_role_pattern: "proj_{slug}_owner"

monorepo:
  workspaces_root: .          # bun workspaces declared in root package.json

nextjs:
  apps: [apps/dashboard, services/admin-ui]   # where Next.js apps live in the monorepo
