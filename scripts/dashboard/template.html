<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sprint Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --panel-2: #232733;
    --border: #2d3142;
    --text: #e6e9ef;
    --text-dim: #8b92a3;
    --accent: #5eead4;
    --planning: #fbbf24;
    --progress: #60a5fa;
    --review: #c084fc;
    --done: #4ade80;
    --warning: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem; margin-bottom: 2rem;
  }
  h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
  h1 .accent { color: var(--accent); }
  .meta { color: var(--text-dim); font-size: 0.875rem; }
  .meta button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); padding: 0.4rem 0.8rem;
    border-radius: 6px; cursor: pointer; font-size: 0.875rem;
  }
  .meta button:hover { background: var(--border); }

  section.project {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  section.project h2 {
    margin: 0 0 1.5rem 0;
    font-size: 1.25rem;
    font-weight: 600;
  }
  section.project h2 .error {
    color: var(--warning); font-size: 0.875rem; font-weight: normal;
  }

  .kanban {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }
  @media (max-width: 1000px) {
    .kanban { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .kanban { grid-template-columns: 1fr; }
    body { padding: 1rem; }
  }

  .column {
    background: var(--panel-2);
    border-radius: 8px;
    padding: 1rem;
    min-height: 100px;
  }
  .column h3 {
    margin: 0 0 1rem 0;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .column h3 .count {
    background: var(--border);
    color: var(--text);
    padding: 0.1rem 0.5rem;
    border-radius: 12px;
    font-size: 0.75rem;
  }

  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--text-dim);
    border-radius: 6px;
    padding: 0.75rem;
    margin-bottom: 0.75rem;
    transition: border-left-color 0.2s, transform 0.15s;
  }
  .card:hover { transform: translateX(2px); }
  .card-planning    { border-left-color: var(--planning); }
  .card-in_progress { border-left-color: var(--progress); }
  .card-review      { border-left-color: var(--review); }
  .card-done        { border-left-color: var(--done); }

  .card-header {
    display: flex; align-items: baseline; gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .card-num {
    color: var(--text-dim);
    font-family: ui-monospace, "SF Mono", Monaco, monospace;
    font-size: 0.875rem;
  }
  .card-theme {
    font-weight: 500;
  }
  .card-meta {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.25rem;
    font-family: ui-monospace, "SF Mono", Monaco, monospace;
  }
  .card-meta.phase {
    color: var(--accent);
  }
  .empty {
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 1rem;
    opacity: 0.5;
  }

  details { margin-top: 1rem; }
  summary { cursor: pointer; color: var(--text-dim); font-size: 0.875rem; }
  summary:hover { color: var(--text); }
  .pr-list { list-style: none; padding-left: 1rem; margin-top: 0.5rem; }
  .pr-list li { padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
  .pr-list li:last-child { border-bottom: none; }
  .pr-list a { color: var(--accent); text-decoration: none; }
  .pr-list a:hover { text-decoration: underline; }
  .label {
    display: inline-block;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 0.1rem 0.5rem;
    border-radius: 12px;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-left: 0.25rem;
  }

  footer {
    margin-top: 3rem;
    color: var(--text-dim);
    font-size: 0.75rem;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header>
    <h1><span class="accent">⚡</span> Sprint Dashboard</h1>
    <div class="meta">
      <span id="generated">Generated: {{GENERATED_AT}}</span>
      <button onclick="location.reload()">↻ Refresh</button>
    </div>
  </header>

  <main>
    {{PROJECTS}}
  </main>

  <footer>
    {{PROJECT_COUNT}} project(s) tracked &middot;
    Generated by <a href="https://github.com/lipefur/sprint-orchestrator" target="_blank">sprint-orchestrator</a>
  </footer>

  <script>
    // Live update via Server-Sent Events (only works in --serve mode)
    if (typeof EventSource !== 'undefined' && window.location.protocol.startsWith('http')) {
      try {
        const es = new EventSource('/events');
        es.onmessage = (e) => {
          if (e.data === 'update') {
            console.log('State changed, reloading...');
            location.reload();
          }
        };
        es.onerror = () => { /* silent — falls back to manual refresh */ };
      } catch (e) { /* not in serve mode, ignore */ }
    }
  </script>
</body>
</html>
